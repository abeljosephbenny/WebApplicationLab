<!DOCTYPE html>
<html>
<head>
    <title>Color Changer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: background 0.5s ease; /* smooth color change */
        }

        h2 {
            color: #333;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05); /* slight zoom */
        }
    </style>
</head>

<body>

   <h2 id="title">Click to Change Background </h2>

    <!-- Button triggers JS function -->
    <button onclick="changeColor()">Change Color</button>

    <script>
        // Function to change background color
        function changeColor() {

            // List of colors
            let colors = ["#ff9a9e", "#a18cd1", "#fbc2eb", "#84fab0", "#8fd3f4"];

            // Generate random index
            let randomIndex = Math.floor(Math.random() * colors.length);

            // Apply color to body
            document.body.style.backgroundColor = colors[randomIndex];
        }
    </script>
   
</body>
</html>
